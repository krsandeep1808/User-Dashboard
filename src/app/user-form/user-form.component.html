<div class="modal-backdrop" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <header>
      <h2>Add User</h2>
      <button type="button" class="close-btn" (click)="close()">×</button>
    </header>

    <form [formGroup]="form" (ngSubmit)="save()">
      <label>
        Name
        <input type="text" formControlName="name" placeholder="Enter name" />
      </label>
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <small class="error">Name is required (minimum 2 characters).</small>
      }

      <label>
        Email
        <input type="email" formControlName="email" placeholder="Enter email" />
      </label>
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small class="error">Please enter a valid email.</small>
      }

      <label>
        Role
        <select formControlName="role">
          <option value="">Select role</option>
          @for (role of roles; track role) {
            <option [value]="role">{{ role }}</option>
          }
        </select>
      </label>
      @if (form.controls.role.touched && form.controls.role.invalid) {
        <small class="error">Role is required.</small>
      }

      <footer>
        <button type="button" class="secondary" (click)="close()">Cancel</button>
        <button type="submit" class="primary">Add User</button>
      </footer>
    </form>
  </div>
</div>
